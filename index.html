    <script>
        const personalProjectsData = [
            {
                title: "Automated Workflow Pipeline Engine",
                type: "GITHUB",
                date: "2026-06",
                desc: "An automated multi-department pipeline tracking and aggregating workflow instances into unified cloud database layers.",
                link: "https://github.com",

            },
            {
                title: "LLM Generation Performance Matrix",
                type: "HUGGING FACE",
                date: "2026-05",
                desc: "A deployment model evaluating token generation consistency and formatting guardrails on custom datasets.",
                link: "https://huggingface.co",
                tags: ["AI", "PyTorch", "LLM Eval"]
            },
            {
                title: "Client-Side Visual Sandbox UI",
                type: "APPS",
                date: "2026-04",
                desc: "A client-side UI application rendering streaming JSON schemas directly into operational visualizations via Tailwind metrics.",
                link: "https://github.com",
                tags: ["JavaScript", "Tailwind", "REST API"]
            },
            {
                title: "Vibe Prototyping Systems Guide",
                type: "YOUTUBE",
                date: "2026-02",
                desc: "A video breakdown logging the end-to-end rapid prototyping of custom operational dashboards using semantic generative prompting structures.",
                link: "https://youtube.com",
                tags: ["Content", "Prompting", "Prototyping"]
            }
        ];

        const renderingGrid = document.getElementById('personal-grid');
        personalProjectsData.sort((a, b) => new Date(b.date) - new Date(a.date));

        personalProjectsData.forEach(project => {
            let badgeStyle = "text-slate-400 border-cyan-900 bg-cyan-950/20";
            if (project.type === "GITHUB") badgeStyle = "text-cyan-400 border-cyan-400/50 bg-cyan-950/40 shadow-[0_0_12px_rgba(34,211,238,0.2)]";
            if (project.type === "HUGGING FACE") badgeStyle = "text-[#f48fb1] border-[#f48fb1]/40 bg-[#f48fb1]/5 shadow-[0_0_12px_rgba(244,143,177,0.2)]";
            if (project.type === "APPS") badgeStyle = "text-emerald-400 border-emerald-500/30 bg-emerald-500/5";
            if (project.type === "YOUTUBE") badgeStyle = "text-red-400 border-red-500/30 bg-red-500/5";

            const tagsMarkup = project.tags.map(t => `<span class="text-[10px] font-mono px-2 py-0.5 border border-cyan-900/60 bg-slate-900/50 rounded text-slate-400">${t}</span>`).join('');

            const finalCardHtml = `
                <div class="premium-card p-6 rounded-2xl flex flex-col justify-between">
                    <div>
                        <div class="flex items-center justify-between mb-4">
                            <span class="font-mono text-[10px] tracking-wider px-2.5 py-0.5 rounded border ${badgeStyle}">${project.type}</span>
                            <span class="font-mono text-xs text-slate-500">${project.date}</span>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-2 tracking-tight">${project.title}</h3>
                        <p class="text-slate-400 text-sm font-light leading-relaxed mb-4">${project.desc}</p>
                        <div class="flex flex-wrap gap-1.5 mb-6">${tagsMarkup}</div>
                    </div>
                    <div>
                        <a href="${project.link}" target="_blank" class="w-full inline-flex items-center justify-between px-4 py-2.5 bg-slate-900/60 hover:bg-[#f48fb1] text-xs font-mono text-slate-300 hover:text-black rounded-xl border border-cyan-900/60 hover:border-transparent transition-all duration-300 group">
                            <span>Inspect Resource</span>
                            <span class="transform group-hover:translate-x-1 transition-transform">&rarr;</span>
                        </a>
                    </div>
                </div>
            `;
            renderingGrid.innerHTML += finalCardHtml;
        });

        // =========================================================
        // 🧠 CANVAS BACKEND: Updated Nodes to High Vibrant Electric Cyan
        // =========================================================
        const canvas = document.getElementById('mesh-canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const nodeCount = 55;
        const nodes = [];
        let mousePosition = { x: null, y: null, activeRadius: 180 };

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        window.addEventListener('mousemove', (e) => { mousePosition.x = e.clientX; mousePosition.y = e.clientY; });
        window.addEventListener('mouseout', () => { mousePosition.x = null; mousePosition.y = null; });

        class MeshNode {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.45;
                this.vy = (Math.random() - 0.5) * 0.45;
                this.radius = Math.random() * 2.5 + 1;
                // Shifted from dark cyan to radiant electric cyan (rgba 6, 182, 212)
                this.color = Math.random() > 0.45 ? 'rgba(6, 182, 212, ' : 'rgba(244, 143, 177, '; 
            }
            step() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;

                if (mousePosition.x && mousePosition.y) {
                    let dx = mousePosition.x - this.x;
                    let dy = mousePosition.y - this.y;
                    let dist = Math.hypot(dx, dy);
                    if (dist < mousePosition.activeRadius) {
                        let dynamicPushFactor = (mousePosition.activeRadius - dist) / mousePosition.activeRadius;
                        this.x -= (dx / dist) * dynamicPushFactor * 1.5;
                        this.y -= (dy / dist) * dynamicPushFactor * 1.5;
                    }
                }
            }
            render() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color + '0.5)'; // Higher opacity for punchier looks
                ctx.fill();
            }
        }

        for (let i = 0; i < nodeCount; i++) nodes.push(new MeshNode());

        function runLoop() {
            ctx.clearRect(0, 0, width, height);
            nodes.forEach(n => { n.step(); n.render(); });
            
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    let d = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
                    if (d < 130) {
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        // Upgraded connection line opacity rules for the neon effect
                        ctx.strokeStyle = nodes[i].color === nodes[j].color ? nodes[i].color + `${0.22 * (1 - d/130)})` : `rgba(100, 116, 139, ${0.12 * (1 - d/130)})`;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(runLoop);
        }
        runLoop();
    </script>
