<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Digital Sandbox</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tableau API for embedding -->
    <script type="module" src="https://public.tableau.com/javascripts/api/tableau.embedding.3.latest.min.js"></script>
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .glass { background: rgba(15, 23, 42, 0.45); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-[#030712] text-gray-100 font-sans antialiased relative overflow-x-hidden selection:bg-cyan-500 selection:text-black">

    <!-- INTERACTIVE CANVAS BACKGROUND -->
    <canvas id="bg-canvas" class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-40"></canvas>

    <!-- TOP GLOW EFFECTS -->
    <div class="fixed top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-cyan-500/10 blur-[120px] pointer-events-none"></div>
    <div class="fixed top-[20%] right-[-10%] w-[40vw] h-[40vw] rounded-full bg-purple-500/10 blur-[120px] pointer-events-none"></div>

    <!-- MAIN PORTFOLIO BODY -->
    <main class="max-w-5xl mx-auto px-6 py-16 relative z-10">

        <!-- HEADER SECTION -->
        <header class="mb-20 max-w-2xl">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full glass border border-cyan-500/30 text-cyan-400 text-xs font-mono mb-6 shadow-[0_0_15px_rgba(6,182,212,0.15)]">
                <span class="w-2 h-2 rounded-full bg-cyan-400 animate-ping"></span> LOG_STREAM: ONLINE
            </div>
            <h1 class="text-4xl sm:text-6xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white via-slate-200 to-gray-500 font-mono">
                fitria_nur_aida<span class="text-cyan-400 font-bold">()</span>
            </h1>
            <p class="mt-6 text-lg sm:text-xl text-gray-400 leading-relaxed font-light">
                Building robust analytical ecosystems, deploying interactive dashboards, and vibe coding automation experiments.
            </p>
        </header>

        <!-- DYNAMIC METRICS OVERVIEW (AUTOMATED CARDS) -->
        <section class="mb-20">
            <h2 class="text-xs font-mono tracking-widest text-cyan-400 uppercase mb-8 flex items-center gap-2">
                <span class="text-purple-400 font-bold">&gt;</span> // Interactive Dashboards
            </h2>
            <div class="glass rounded-2xl border border-white/10 p-3 shadow-2xl transition-all duration-500 hover:border-cyan-500/40 hover:shadow-[0_0_30px_rgba(6,182,212,0.1)]">
                <div class="w-full aspect-[16/9] rounded-xl overflow-hidden bg-slate-900/50 relative">
                    <!-- Drop your live Looker Studio or Tableau public shared link inside src below -->
                    <iframe width="100%" height="100%" src="https://lookerstudio.google.com/embed/reporting/0B5gKw_N8wO9eS2RQX01ScV9vUTA/page/1M" frameborder="0" style="border:0" allowfullscreen></iframe>
                </div>
            </div>
        </section>

        <!-- DYNAMIC LOG STREAM SECTION -->
        <section>
            <h2 class="text-xs font-mono tracking-widest text-cyan-400 uppercase mb-8 flex items-center gap-2">
                <span class="text-purple-400 font-bold">&gt;</span> // Technical Log & Projects
            </h2>
            
            <!-- JavaScript renders the project list array right here -->
            <div id="dynamic-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer class="max-w-5xl mx-auto px-6 py-12 border-t border-white/5 text-center text-xs font-mono text-gray-600">
        SYS.REF // EXECUTION_SUCCESSFUL &bull; HOSTED BY GITHUB PAGES
    </footer>

    <!-- INTERACTIVE ENGINE & DATA PACKAGES -->
    <script>
        // =========================================================
        // 🛠️ DATA ENTRY MATRIX: EDITED ITEMS LIVE HERE
        // =========================================================
        const myPortfolioData = [
            {
                title: "Automated Ecosystem Dashboard",
                type: "CODE REPO",
                badgeClass: "text-blue-400 border-blue-500/20 bg-blue-500/5",
                desc: "Transitioned manual department workflows into an automated data pipeline using SQL orchestration.",
                link: "https://github.com",
                actionLabel: "View Source"
            },
            {
                title: "Evaluating LLM Reasoning Benchmarks",
                type: "ARTICLE",
                badgeClass: "text-purple-400 border-purple-500/20 bg-purple-500/5",
                desc: "An end-to-end framework layout exploring structured feedback loops in prompt architecture.",
                link: "https://github.com",
                actionLabel: "Read Post"
            },
            {
                title: "Markdown-to-HTML Parser Sandbox",
                type: "VIBE CODING",
                badgeClass: "text-amber-400 border-amber-500/20 bg-amber-500/5",
                desc: "A lightweight scratchpad UI designed entirely via generative AI workflows to parse string tokens.",
                link: "https://github.com",
                actionLabel: "Launch App"
            }
        ];

        // =========================================================
        // 🔄 DYNAMIC CARD GENERATOR
        // =========================================================
        const targetGrid = document.getElementById('dynamic-grid');
        myPortfolioData.forEach(item => {
            const cardHtml = `
                <div class="group relative p-[1px] rounded-2xl transition-all duration-300 hover:scale-[1.02]">
                    <!-- Outer Glow Boundary border effect -->
                    <div class="absolute inset-0 bg-gradient-to-r from-cyan-500/0 to-purple-500/0 group-hover:from-cyan-500/20 group-hover:to-purple-500/20 rounded-2xl transition-all duration-500"></div>
                    
                    <!-- Main Inner Glass Panel -->
                    <div class="relative glass border border-white/5 group-hover:border-white/10 p-6 rounded-2xl h-full flex flex-col justify-between transition-all duration-300 shadow-xl group-hover:shadow-2xl">
                        <div>
                            <div class="flex items-center justify-between mb-4">
                                <span class="font-mono text-[10px] px-2.5 py-1 border rounded-md tracking-wider ${item.badgeClass}">${item.type}</span>
                                <span class="font-mono text-[11px] text-gray-600 group-hover:text-cyan-400 transition-colors duration-300">// active</span>
                            </div>
                            <h3 class="text-xl font-bold text-white tracking-tight mb-2 group-hover:text-transparent group-hover:bg-clip-text group-hover:bg-gradient-to-r group-hover:from-white group-hover:to-cyan-200 transition-all duration-300">${item.title}</h3>
                            <p class="text-gray-400 text-sm font-light leading-relaxed mb-6">${item.desc}</p>
                        </div>
                        <div>
                            <a href="${item.link}" target="_blank" class="w-full inline-flex items-center justify-between px-4 py-2.5 bg-white/5 hover:bg-cyan-500 text-sm font-mono text-gray-300 hover:text-black rounded-xl border border-white/5 hover:border-transparent transition-all duration-300 group/btn">
                                <span>${item.actionLabel}</span>
                                <span class="transform group-hover/btn:translate-x-1 transition-transform duration-300">&rarr;</span>
                            </a>
                        </div>
                    </div>
                </div>
            `;
            targetGrid.innerHTML += cardHtml;
        });

        // =========================================================
        // 🧠 INTERACTIVE LIVE BACKGROUND CANVAS ENGINE
        // =========================================================
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const numParticles = 45;
        const particles = [];
        let mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.radius = Math.random() * 2 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;

                // Mouse interaction rule
                if (mouse.x && mouse.y) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let dist = Math.hypot(dx, dy);
                    if (dist < mouse.radius) {
                        let force = (mouse.radius - dist) / mouse.radius;
                        this.x -= (dx / dist) * force * 2;
                        this.y -= (dy / dist) * force * 2;
                    }
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(6, 182, 212, 0.35)';
                ctx.fill();
            }
        }

        for (let i = 0; i < numParticles; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            
            // Connect line calculations
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dist = Math.hypot(particles[i].x - particles[j].x, particles[i].y - particles[j].y);
                    if (dist < 110) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(139, 92, 246, ${0.15 * (1 - dist / 110)})`;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
