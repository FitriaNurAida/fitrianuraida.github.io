<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace & Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://public.tableau.com/javascripts/api/tableau.embedding.3.latest.min.js"></script>
</head>
<body class="bg-[#0b0f19] text-gray-200 font-sans selection:bg-cyan-500 selection:text-black">

    <!-- MAIN WRAPPER -->
    <main class="max-w-4xl mx-auto px-6 py-20">
        
        <!-- HEADER / INTRO -->
        <header class="mb-16">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-cyan-500/10 border border-cyan-500/20 text-cyan-400 text-xs font-mono mb-4 animate-pulse">
                <span class="w-2 h-2 rounded-full bg-cyan-400"></span> System Active
            </div>
            <h1 class="text-4xl font-light tracking-tight text-white sm:text-5xl font-mono">
                fitria_nur_aida<span class="text-cyan-400">.log</span>
            </h1>
            <p class="mt-6 text-lg text-gray-400 leading-relaxed max-w-xl">
                Building dashboards, testing AI agents, and documenting technical workflows. This is my digital sandbox.
            </p>
        </header>

        <!-- LIVE ANALYTICS EMBED SECTION -->
        <section class="mb-20">
            <h2 class="text-xs font-mono tracking-widest text-cyan-400 uppercase mb-6 flex items-center gap-2">
                // Interactive Dashboards
            </h2>
            <div class="bg-[#121826] rounded-xl border border-gray-800 p-2 shadow-2xl">
                <div class="w-full aspect-[16/9] rounded-lg overflow-hidden bg-[#1a2333]">
                    <!-- Replace URL in src below with your Looker/Tableau embed -->
                    <iframe width="100%" height="100%" src="https://lookerstudio.google.com/embed/reporting/0B5gKw_N8wO9eS2RQX01ScV9vUTA/page/1M" frameborder="0" style="border:0" allowfullscreen></iframe>
                </div>
            </div>
        </section>

        <!-- STREAM / DYNAMIC ITEMS -->
        <section>
            <h2 class="text-xs font-mono tracking-widest text-cyan-400 uppercase mb-6">
                // Output & Artifacts
            </h2>
            
            <!-- Target for JavaScript data rendering -->
            <div id="log-stream" class="space-y-4"></div>
        </section>

    </main>

    <!-- DYNAMIC DATA (Still very easy to edit!) -->
    <script>
        const myItems = [
            {
                title: "Automated Ecosystem Dashboard",
                tag: "pipeline",
                desc: "Transitioned manual department workflows into automated SQL orchestrations.",
                link: "#",
                actionText: "Source Code"
            },
            {
                title: "Evaluating LLM Reasoning Benchmarks",
                tag: "article",
                desc: "Analyzing room for structural feedback loops within agentic prompt engineering frameworks.",
                link: "#",
                actionText: "Read Post"
            },
            {
                title: "Dynamic Markdown Parser Sandbox",
                tag: "vibe-coding",
                desc: "A lightweight scratchpad built using generative workflows to render text layouts instantly.",
                link: "#",
                actionText: "Launch Tool"
            }
        ];

        const stream = document.getElementById('log-stream');
        myItems.forEach(item => {
            const row = `
                <div class="group bg-[#121826] hover:bg-[#161e30] border border-gray-800 hover:border-gray-700 p-6 rounded-xl transition-all duration-200 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <div class="space-y-2">
                        <div class="flex items-center gap-3">
                            <span class="font-mono text-xs text-gray-500 group-hover:text-cyan-400/80 transition-colors">[ ${item.tag} ]</span>
                            <h3 class="text-lg font-medium text-white">${item.title}</h3>
                        </div>
                        <p class="text-gray-400 text-sm max-w-xl leading-relaxed">${item.desc}</p>
                    </div>
                    <div class="shrink-0">
                        <a href="${item.link}" target="_blank" class="inline-flex items-center justify-center px-4 py-2 bg-[#1a2333] hover:bg-cyan-500 hover:text-black font-mono text-xs text-cyan-400 rounded-lg transition-all border border-gray-800 hover:border-transparent">
                            ${item.actionText}
                        </a>
                    </div>
                </div>
            `;
            stream.innerHTML += row;
        });
    </script>
</body>
</html>
